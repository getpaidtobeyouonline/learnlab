<style>
  :root{
    --ll-blue:#2176ef;--ll-blue-d:#1a5fc4;--ll-red:#fa241b;--ll-yellow:#fedb31;
    --ll-black:#000;--ll-ink:#15181f;--ll-bg:#fff;--ll-surface:#f5f8ff;--ll-line:#e6e9f2;--ll-muted:#5b6477;
    --ll-font-head:'Fredoka',system-ui,-apple-system,'Segoe UI',sans-serif;
    --ll-font-body:'Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
    --ll-radius-card:16px;--ll-radius-ctl:12px;--ll-border:2px solid var(--ll-black);
    --ll-shadow:4px 4px 0 var(--ll-black);--ll-shadow-sm:3px 3px 0 var(--ll-black);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--ll-font-body);color:var(--ll-ink);background:var(--ll-surface);line-height:1.55;-webkit-text-size-adjust:100%;}
  .ll-wrap{max-width:760px;margin:0 auto;padding:16px;}
  .ll-header{display:flex;align-items:center;gap:16px;background:var(--ll-bg);border:var(--ll-border);border-radius:var(--ll-radius-card);box-shadow:var(--ll-shadow);padding:16px;margin-bottom:22px;}
  .ll-header img.ll-logo{height:40px;width:auto;display:block;flex:0 0 auto;}
  .ll-header h1{font-family:var(--ll-font-head);font-weight:700;font-size:1.25rem;margin:0;line-height:1.1;}
  .ll-header p{margin:2px 0 0;font-size:.9rem;color:var(--ll-muted);}
  .ll-card{background:var(--ll-bg);border:var(--ll-border);border-radius:var(--ll-radius-card);padding:22px;margin-bottom:16px;}
  .ll-card--pop{box-shadow:var(--ll-shadow);}
  .ll-fams{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .ll-chip{font-family:var(--ll-font-head);font-weight:600;font-size:.85rem;padding:7px 12px;min-height:38px;border:var(--ll-border);border-radius:999px;background:#fff;color:var(--ll-ink);cursor:pointer;}
  .ll-chip.is-on{background:var(--ll-blue);color:#fff;}
  .ll-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .ll-inst{border:var(--ll-border);border-radius:var(--ll-radius-card);background:#fff;padding:12px 6px;text-align:center;cursor:pointer;transition:transform .1s ease;}
  .ll-inst:hover{transform:translateY(-2px);background:var(--ll-surface);}
  .ll-inst.is-on{background:var(--ll-yellow);}
  .ll-inst .e{font-size:1.8rem;display:block;}
  .ll-inst .n{font-family:var(--ll-font-head);font-weight:700;font-size:.78rem;}
  .ll-detail{border:var(--ll-border);border-radius:var(--ll-radius-card);background:var(--ll-surface);padding:16px;margin-top:16px;}
  .ll-detail h2{font-family:var(--ll-font-head);margin:0 0 4px;color:var(--ll-blue);font-size:1.3rem;}
  .ll-detail .fam{font-size:.82rem;color:var(--ll-muted);font-weight:700;margin:0 0 12px;}
  .ll-frow{display:flex;gap:10px;padding:7px 0;border-bottom:2px dotted var(--ll-line);}
  .ll-frow:last-child{border-bottom:none;}
  .ll-frow .k{font-family:var(--ll-font-head);font-weight:700;color:var(--ll-blue);min-width:90px;}
  .ll-frow .v{flex:1;}
  .ll-footer{text-align:center;font-size:.82rem;color:var(--ll-muted);padding:22px 0 16px;}
  .ll-footer b{color:var(--ll-blue);font-family:var(--ll-font-head);}
  @media (max-width:520px){.ll-header h1{font-size:1.1rem;}.ll-grid{grid-template-columns:repeat(3,1fr);}.ll-frow .k{min-width:74px;}}
</style>

      <div class="ll-htext">
        <h1>Instrument Explorer</h1>
        <p>Tap an instrument → how it sounds, its family &amp; where it's from.</p>
      </div>
    </header>

    <section class="ll-card ll-card--pop">
      <div class="ll-fams" id="fams"></div>
      <div class="ll-grid" id="grid"></div>
      <div class="ll-detail" id="detail" aria-live="polite"></div>
    </section>

    <footer class="ll-footer">Learn Lab · <b>Discover. Understand. Succeed.</b></footer>
  </main>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  function esc(s){ return s.replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  var I=[
    {e:'🎻',n:'Violin',fam:'Strings',sound:'Warm and singing — high notes that can be sweet or sad.',how:'You draw a bow across strings, or pluck them.',from:'Developed in Italy in the 1500s.'},
    {e:'🎸',n:'Guitar',fam:'Strings',sound:'Bright and rhythmic — can strum chords or pluck a tune.',how:'You pluck or strum the strings with your fingers or a pick.',from:'Has roots in Spain.'},
    {e:'🎹',n:'Piano',fam:'Keyboard',sound:'Rich — can play soft and gentle or big and bold.',how:'Pressing keys makes tiny hammers hit strings inside.',from:'Invented in Italy around 1700.'},
    {e:'🥁',n:'Drums',fam:'Percussion',sound:'Punchy and powerful — keeps the beat.',how:'You hit the drum skins with sticks or hands.',from:'Among the oldest instruments, found all over the world.'},
    {e:'🎺',n:'Trumpet',fam:'Brass',sound:'Bright and bold — can be loud and exciting.',how:'You buzz your lips into the mouthpiece and press valves.',from:'Ancient versions were used as far back as Egypt.'},
    {e:'🎷',n:'Saxophone',fam:'Woodwind',sound:'Smooth and jazzy — warm and expressive.',how:'You blow across a reed and press keys to change notes.',from:'Invented in Belgium in the 1840s.'},
    {e:'🪈',n:'Flute',fam:'Woodwind',sound:'Light and airy — high, gentle, and clear.',how:'You blow across a hole, not into a reed.',from:'One of the oldest instruments, made from bone long ago.'},
    {e:'🎻',n:'Cello',fam:'Strings',sound:'Deep and rich — close to a human voice.',how:'You sit and draw a bow across thick strings.',from:'Part of the violin family from Italy.'},
    {e:'🪗',n:'Accordion',fam:'Keyboard',sound:'Lively and full — great for folk and dance music.',how:'You squeeze the bellows and press keys and buttons.',from:'Developed in Europe in the 1800s.'},
    {e:'🔔',n:'Xylophone',fam:'Percussion',sound:'Bright and ringing — cheerful, bell-like notes.',how:'You strike wooden bars with mallets.',from:'Versions are found in Africa and Asia.'},
    {e:'🎵',n:'Harp',fam:'Strings',sound:'Magical and flowing — like sparkling water.',how:'You pluck many strings with both hands.',from:'An ancient instrument shown in old Egyptian art.'},
    {e:'📯',n:'Tuba',fam:'Brass',sound:'Deep and rumbling — the lowest brass voice.',how:'You buzz your lips and press valves into a huge horn.',from:'Developed in Germany in the 1800s.'},
    {e:'🪘',n:'Djembe',fam:'Percussion',sound:'Earthy and resonant — high slaps and deep booms.',how:'You play it with bare hands.',from:'A traditional drum from West Africa.'},
    {e:'🎶',n:'Clarinet',fam:'Woodwind',sound:'Mellow and woody — smooth across a wide range.',how:'You blow over a single reed and cover holes/keys.',from:'Developed in Germany around 1700.'}
  ];
  var fams=['All'].concat(I.map(function(x){return x.fam;}).filter(function(c,i,a){return a.indexOf(c)===i;}));
  var activeFam='All';
  function renderFams(){
    var f=$('fams'); f.innerHTML='';
    fams.forEach(function(fa){
      var b=document.createElement('button'); b.type='button'; b.className='ll-chip'+(fa===activeFam?' is-on':''); b.textContent=fa;
      b.addEventListener('click',function(){ activeFam=fa; document.querySelectorAll('#fams .ll-chip').forEach(function(x){x.classList.remove('is-on');}); b.classList.add('is-on'); renderGrid(); });
      f.appendChild(b);
    });
  }
  function renderGrid(){
    var g=$('grid'); g.innerHTML='';
    var rows=I.filter(function(x){return activeFam==='All'||x.fam===activeFam;});
    rows.forEach(function(x){
      var realIdx=I.indexOf(x);
      var b=document.createElement('button'); b.type='button'; b.className='ll-inst';
      b.innerHTML='<span class="e">'+x.e+'</span><span class="n">'+x.n+'</span>';
      b.addEventListener('click',function(){ select(realIdx,b); });
      g.appendChild(b);
    });
    // auto-select first
    var first=g.querySelector('.ll-inst'); if(first){ first.click(); }
  }
  function select(i,btn){
    document.querySelectorAll('.ll-inst').forEach(function(x){x.classList.remove('is-on');});
    if(btn)btn.classList.add('is-on');
    var x=I[i];
    $('detail').innerHTML='<h2>'+x.e+' '+esc(x.n)+'</h2><p class="fam">Family: '+esc(x.fam)+'</p>'+
      '<div class="ll-frow"><span class="k">Sounds like</span><span class="v">'+esc(x.sound)+'</span></div>'+
      '<div class="ll-frow"><span class="k">How to play</span><span class="v">'+esc(x.how)+'</span></div>'+
      '<div class="ll-frow"><span class="k">Where from</span><span class="v">'+esc(x.from)+'</span></div>';
  }
  renderFams(); renderGrid();
})();
</script>
